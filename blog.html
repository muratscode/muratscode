<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creatıveblog</title>
    <style>
      
     body{
        background-image: url(web39.jpg);
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        
     }   

nav {
  width: 300px;
  background: aqua;
  color: rgba(0, 0, 0, 0.87);
  -webkit-clip-path: circle(24px at 30px 24px);
  clip-path: circle(24px at 32px 24px);
  -webkit-transition: -webkit-clip-path 0.5625s, clip-path 0.375s;
  transition: -webkit-clip-path 0.5625s, clip-path 0.375s;
}
nav:hover{
    -webkit-transition-timing-function: ease-out;
    transition-timing-function: ease-out;
    -webkit-transition-duration: 0.75s;
    transition-duration: 0.75s;
    -webkit-clip-path: circle(390px at 225px 24px);
    clip-path: circle(390px at 150px 24px);
    background: fuchsia;
}

     a {
        display: block;
        line-height: 50px;
        padding: 0 20px;
        color: inherit;
        cursor: pointer;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
     }

     a:hover{background: #ffe082;}
     a:active{background: #ffca28;}

     .navicon{
        padding: 23px 20px;
        cursor: pointer;
        -webkit-transform-origin: 32px 24px;
        -ms-transform-origin: 32px 24px;
        transform-origin: 32px 24px;
     }

     .navicon div {
      position: relative;
      width: 20px;
      height: 2px;
      background: rgba(0, 0, 0, 0.87);
     }

     .navicon div:before,
     .navicon div:after{
      display: block;
      content: "";
      width: 20px;
      height: 2px;
      background: rgba(0, 0, 0, 0.87);
      position: absolute;
     }
     
     .navicon div:before{ top: -7px;}
     .navicon div:after{ top: 7px;}

     .tt1{
       width:100%;
       height: 120px;
       border: solid 1px red;
       border-radius: 20px;
       position: relative;
       top: 20px;
     }


    </style>
</head>
<body>
  <nav>
    <div class="navicon">
        <div></div>
    </div>
    <a>Ana Sayfa</a>
    <a>Galeri</a>
    <a>Neon Logo</a>
    <a>Hakkımızda</a>
    <a>İletişim</a>
    <a></a>
    <a></a>
    <a></a>
  </nav>  

<div class="tt1">

</div>
<div class="tt1">

</div>
<div class="tt1">

</div>
<div class="tt1">

</div>


</body>
</html>
