<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titrek Glowing Buton</title>
<style>
    body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .glow-button {
        padding: 15px 40px;
        font-size: 20px;
        color: #fff;
        background: transparent;
        border: 2px solid #0ff;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: Arial, sans-serif;
        transition: 0.3s;
        animation: flicker 2s infinite;
        box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
    }

    /* Hover efekti */
    .glow-button:hover {
        background: #0ff;
        color: #000;
        box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
    }

    /* Titrek (flicker) animasyonu */
    @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
            opacity: 1;
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
        }
        20%, 24%, 55% {
            opacity: 0.4;
            text-shadow: none;
        }
    }
</style>
</head>
<body>

<button class="glow-button">Glowing</button>

</body>
</html>
