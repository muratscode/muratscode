<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      @import url(https://fonts.googleapis.com/css?family=Raleway);

      :root {
        --glow-color: hsl(175, 87%, 48%);
      }

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        display: grid;
        height: 100%;
        place-items: center;
        background: #000;
      }

      .btnglow {
        position: relative;
        color: var(--glow-color);
        cursor: pointer;
        padding: 0.35em 1em;
        border: 0.15em solid var(--glow-color);
        background: none;
        border-radius: 0.45em;
        perspective: 2em;
        font-family: "Releway", sans-serif;
        font-size: 2em;
        font-weight: 900;
        letter-spacing: 1em;
        box-shadow: inset 0px 0px 0.5em 0px var(--glow-color),
          0px 0px 0.5em 0px var(--glow-color);
        animation: border-flicker 2s linear infinite;
      }

      .glowing_btn::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        opacity: 0.7;
        filter: blur(1em);
        transform: translateY(120%) rotateX(95deg) scale(1, 0.35);
        background: var(--glow-color);
        pointer-events: none;
      }

      .glowing_btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        opacity: 0;
        z-index: -1;
        background-color: var(--glow-color);
        box-shadow: 0 0 2em 0.2em var(--glow-color);
        transition: opacity 100ms linear;
      }

      .glowing_txt {
        float: left;
        margin-right: -0.8em;
        text-shadow: 0 0 0.45em hsl(0 0% 100% / 0.3),
          0 0 0.45em var(--glow-color);
          animation: text-flicker 3s linear infinite;
      }

      .faulty_letter {
        opacity: 0.5;
        animation: faulty-flicker 3s linear infinity;
      }

      .glowing_btn:hover {
        color: rgba(0, 0, 0, 0.8);
        text-shadow: none;
        animation: none;
      }

      .glowing_btn:hover .glowing_txt {
        animation: none;
      }

      .glowing_btn:hover .faulty_letter {
        animation: none;
        text-shadow: none;
        opacity: 1;
      }

      .glowing_btn:hover::before {
        filter: blur(1.5em);
        opacity: 1;
      }

      .glowing_btn:hover::after {
        opacity: 1;
      }

      @keyframes faulty-flicker {
        0% {
          opacity: 0.1;
        }
        2% {
          opacity: 0.1;
        }
        4% {
          opacity: 0.5;
        }
        19% {
          opacity: 0.5;
        }
        21% {
          opacity: 0.1;
        }
        23% {
          opacity: 0.1;
        }
        80% {
          opacity: 0.5;
        }
        83% {
          opacity: 0.4;
        }
        87% {
          opacity: 0.1;
        }
      }

      @keyframes text-flicker {
        0% {
          opacity: 0.1;
        }
        2% {
          opacity: 1;
        }
        8% {
          opacity: 0.1;
        }
        9% {
          opacity: 1;
        }
        12% {
          opacity: 0.1;
        }
        20% {
          opacity: 1;
        }
        25% {
          opacity: 0.3;
        }
        30% {
          opacity: 1;
        }
        70% {
          opacity: 0.7;
        }
        72% {
          opacity: 0.2;
        }
        77% {
          opacity: 0.9;
        }
        100% {
          opacity: 0.9;
        }
      }

      @keyframes border-flicker {
        0% {
          opacity: 0.1;
        }
        2% {
          opacity: 1;
        }
        4% {
          opacity: 0.1;
        }
        8% {
          opacity: 1;
        }
        70% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <button class="btnglow">
      <span class="glowing_txt">C<span class="faulty_letter">L</span>ICK</span>
    </button>
  </body>
</html>
